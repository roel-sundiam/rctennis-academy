<div class="profile-panel">
  <div class="profile-panel__header">
    <span class="profile-panel__name">{{ username }}</span>
    <span class="profile-panel__role" [class.profile-panel__role--super]="role === 'superadmin'">
      {{ role === 'superadmin' ? 'Super Admin' : 'Admin' }}
    </span>
  </div>

  <hr class="profile-panel__divider" />

  <div class="profile-panel__section">
    <h4 class="profile-panel__section-title">Change Password</h4>

    @if (successMsg()) {
      <div class="alert alert--success">{{ successMsg() }}</div>
    }
    @if (errorMsg()) {
      <div class="alert alert--error">{{ errorMsg() }}</div>
    }

    <div class="stack">
      <div class="form-group">
        <label class="form-label" for="current-pw">Current password</label>
        <input
          id="current-pw"
          type="password"
          class="form-control"
          [(ngModel)]="currentPassword"
          autocomplete="current-password"
          placeholder="Enter current password"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="new-pw">New password</label>
        <input
          id="new-pw"
          type="password"
          class="form-control"
          [(ngModel)]="newPassword"
          autocomplete="new-password"
          placeholder="At least 8 characters"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm-pw">Confirm new password</label>
        <input
          id="confirm-pw"
          type="password"
          class="form-control"
          [(ngModel)]="confirmPassword"
          autocomplete="new-password"
          placeholder="Repeat new password"
        />
      </div>

      <div class="cluster profile-panel__actions">
        <button class="btn btn-secondary btn-sm" type="button" (click)="cancel()">Cancel</button>
        <button class="btn btn-primary btn-sm" type="button" (click)="save()" [disabled]="saving()">
          {{ saving() ? 'Saving…' : 'Save' }}
        </button>
      </div>
    </div>
  </div>
</div>
